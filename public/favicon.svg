<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background -->
  <rect width="100" height="100" rx="20" fill="#0e0e0e"/>

  <!-- Neural network nodes — 3 layers -->
  <!-- Left layer: 2 nodes -->
  <circle cx="22" cy="33" r="5" fill="none" stroke="#22d3ee" stroke-width="2"/>
  <circle cx="22" cy="67" r="5" fill="none" stroke="#22d3ee" stroke-width="2"/>

  <!-- Middle layer: 3 nodes -->
  <circle cx="50" cy="20" r="5" fill="none" stroke="#38bdf8" stroke-width="2"/>
  <circle cx="50" cy="50" r="6" fill="#22d3ee"/>
  <circle cx="50" cy="80" r="5" fill="none" stroke="#38bdf8" stroke-width="2"/>

  <!-- Right layer: 2 nodes -->
  <circle cx="78" cy="33" r="5" fill="none" stroke="#22d3ee" stroke-width="2"/>
  <circle cx="78" cy="67" r="5" fill="none" stroke="#22d3ee" stroke-width="2"/>

  <!-- Connections left → middle -->
  <line x1="27" y1="33" x2="45" y2="22" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="27" y1="33" x2="44" y2="50" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="27" y1="33" x2="45" y2="78" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.2"/>
  <line x1="27" y1="67" x2="45" y2="22" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.2"/>
  <line x1="27" y1="67" x2="44" y2="50" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="27" y1="67" x2="45" y2="78" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Connections middle → right -->
  <line x1="56" y1="22" x2="73" y2="33" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="56" y1="50" x2="73" y2="33" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="56" y1="50" x2="73" y2="67" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="56" y1="78" x2="73" y2="67" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="56" y1="22" x2="73" y2="67" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.2"/>
  <line x1="56" y1="78" x2="73" y2="33" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.2"/>
</svg>
