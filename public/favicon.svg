<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="#0e0e0e"/>

  <!-- Floppy ears (amber, behind head) -->
  <ellipse cx="24" cy="46" rx="13" ry="17" fill="#c8904a" stroke="#1a1007" stroke-width="2"/>
  <ellipse cx="76" cy="46" rx="13" ry="17" fill="#c8904a" stroke="#1a1007" stroke-width="2"/>

  <!-- Head base (amber) -->
  <ellipse cx="50" cy="46" rx="28" ry="26" fill="#c8904a" stroke="#1a1007" stroke-width="2"/>

  <!-- White face patch (muzzle + forehead) -->
  <ellipse cx="50" cy="57" rx="18" ry="13" fill="#f5f0e8"/>
  <ellipse cx="50" cy="37" rx="10" ry="9" fill="#f5f0e8"/>

  <!-- Eyes -->
  <circle cx="39" cy="43" r="5.5" fill="#1a1007"/>
  <circle cx="61" cy="43" r="5.5" fill="#1a1007"/>
  <!-- Eye shine -->
  <circle cx="41" cy="41" r="1.8" fill="white"/>
  <circle cx="63" cy="41" r="1.8" fill="white"/>

  <!-- Nose -->
  <ellipse cx="50" cy="55" rx="5" ry="3.5" fill="#1a1007"/>

  <!-- Smile lines -->
  <path d="M43 59 Q50 65 57 59" stroke="#1a1007" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Tongue -->
  <ellipse cx="50" cy="67" rx="7" ry="6" fill="#e8607a"/>
  <line x1="50" y1="63" x2="50" y2="73" stroke="#c04060" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Tail (peeking right side) -->
  <path d="M80 58 Q92 48 88 38 Q85 32 80 38" fill="#c8904a" stroke="#1a1007" stroke-width="2" stroke-linejoin="round"/>
</svg>
